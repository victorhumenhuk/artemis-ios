name: Artemis
# Packages-free spec for fast core iteration. `project.yml` is the real one
# (adds the pinned SDKs). The app compiles identically either way because every
# SDK use is behind `#if canImport(...)`.
options:
  bundleIdPrefix: com.artemis
  deploymentTarget:
    iOS: "26.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.0"
    SWIFT_STRICT_CONCURRENCY: minimal
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    IPHONEOS_DEPLOYMENT_TARGET: "26.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    GENERATE_INFOPLIST_FILE: NO

targets:
  Artemis:
    type: application
    platform: iOS
    sources:
      - path: Artemis
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.artemis.app
        INFOPLIST_FILE: Artemis/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: NO
