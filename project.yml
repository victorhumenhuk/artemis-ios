name: Artemis
options:
  bundleIdPrefix: com.artemis
  deploymentTarget:
    iOS: "26.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    # Swift 5 language mode: full async/await + actors, without Swift 6 strict
    # data-race enforcement that would otherwise drown an MVP in build errors.
    SWIFT_VERSION: "5.0"
    SWIFT_STRICT_CONCURRENCY: minimal
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    IPHONEOS_DEPLOYMENT_TARGET: "26.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    GENERATE_INFOPLIST_FILE: NO

# ─────────────────────────────────────────────────────────────────────────
# Pinned SDKs. Every use of these is wrapped in `#if canImport(...)`, so the
# app compiles and fully runs with this block empty. Enable them for the real
# realtime voice / on-device transcription / paywall (see README "SDKs").
# ─────────────────────────────────────────────────────────────────────────
packages:
  # Vendored from github.com/m1guelpf/swift-realtime-openai (branch main) with a
  # small patch so GA gpt-realtime-2 response items (transcripts + tool calls)
  # populate. See ThirdParty/swift-realtime-openai and README "SDK patch".
  RealtimeOpenAI:
    path: ThirdParty/swift-realtime-openai
  RevenueCat:
    url: https://github.com/RevenueCat/purchases-ios-spm
    from: "5.0.0"
  WhisperKit:
    url: https://github.com/argmaxinc/argmax-oss-swift
    from: "1.0.0"

targets:
  Artemis:
    type: application
    platform: iOS
    sources:
      - path: Artemis
    dependencies:
      - package: RealtimeOpenAI
        product: RealtimeAPI
      - package: RevenueCat
        product: RevenueCat
      - package: WhisperKit
        product: WhisperKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.artemis.app
        INFOPLIST_FILE: Artemis/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        # Simulator builds stay unsigned (no team needed). Device builds (iphoneos)
        # use Automatic signing with "Apple Development"; select your DEVELOPMENT_TEAM
        # in Xcode > Signing & Capabilities. Applies to both Debug and Release.
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: NO
        "CODE_SIGN_IDENTITY[sdk=iphoneos*]": Apple Development
        "CODE_SIGNING_REQUIRED[sdk=iphoneos*]": YES
        "CODE_SIGNING_ALLOWED[sdk=iphoneos*]": YES
